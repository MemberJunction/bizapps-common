<!-- Account & Status section card -->
<div class="section-card">
    <div class="section-card__header">
        <i class="fa-solid fa-shield-halved"></i> Account &amp; Status
    </div>
    @if (Record) {
        <div class="section-card__body">
            <!-- Row: LinkedUserID (record link), Status (select) -->
            <div class="field-grid-2">
                <mj-form-field [Record]="Record" [ShowLabel]="true" FieldName="LinkedUserID"
                    Type="textbox" [EditMode]="EditMode" [FormContext]="FormContext" LinkType="Record"></mj-form-field>
                <mj-form-field [Record]="Record" [ShowLabel]="true" FieldName="Status"
                    Type="select" [EditMode]="EditMode" [FormContext]="FormContext"></mj-form-field>
            </div>
        </div>
    }
</div>
