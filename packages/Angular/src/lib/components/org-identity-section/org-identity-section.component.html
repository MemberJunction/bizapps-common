<div class="section-card">
    <div class="section-card__header">
        <i class="fa-solid fa-building section-card__icon"></i>
        <span class="section-card__title">Organization Details</span>
    </div>

    @if (Record) {
        <div class="section-card__body">
            <!-- Row 1: Name, LegalName -->
            <div class="field-grid">
                <mj-form-field [Record]="Record" [ShowLabel]="true" FieldName="Name"
                    Type="textbox" [EditMode]="EditMode" [FormContext]="FormContext"></mj-form-field>
                <mj-form-field [Record]="Record" [ShowLabel]="true" FieldName="LegalName"
                    Type="textbox" [EditMode]="EditMode" [FormContext]="FormContext"></mj-form-field>
            </div>

            <!-- Row 2: OrganizationType, Status -->
            <div class="field-grid">
                <mj-form-field [Record]="Record" [ShowLabel]="true" FieldName="OrganizationTypeID"
                    Type="textbox" [EditMode]="EditMode" [FormContext]="FormContext" LinkType="Record"></mj-form-field>
                <mj-form-field [Record]="Record" [ShowLabel]="true" FieldName="Status"
                    Type="select" [EditMode]="EditMode" [FormContext]="FormContext"></mj-form-field>
            </div>

            <!-- Row 3: Website, Phone -->
            <div class="field-grid">
                <mj-form-field [Record]="Record" [ShowLabel]="true" FieldName="Website"
                    Type="textbox" [EditMode]="EditMode" [FormContext]="FormContext" LinkType="URL"></mj-form-field>
                <mj-form-field [Record]="Record" [ShowLabel]="true" FieldName="Phone"
                    Type="textbox" [EditMode]="EditMode" [FormContext]="FormContext"></mj-form-field>
            </div>

            <!-- Row 4: Email, TaxID -->
            <div class="field-grid">
                <mj-form-field [Record]="Record" [ShowLabel]="true" FieldName="Email"
                    Type="textbox" [EditMode]="EditMode" [FormContext]="FormContext" LinkType="Email"></mj-form-field>
                <mj-form-field [Record]="Record" [ShowLabel]="true" FieldName="TaxID"
                    Type="textbox" [EditMode]="EditMode" [FormContext]="FormContext"></mj-form-field>
            </div>

            <!-- Row 5: FoundedDate -->
            <div class="field-grid field-grid--single">
                <mj-form-field [Record]="Record" [ShowLabel]="true" FieldName="FoundedDate"
                    Type="datepicker" [EditMode]="EditMode" [FormContext]="FormContext"></mj-form-field>
            </div>

            <!-- Full-width: ParentOrganization -->
            <div class="field-grid field-grid--single">
                <mj-form-field [Record]="Record" [ShowLabel]="true" FieldName="ParentID"
                    Type="textbox" [EditMode]="EditMode" [FormContext]="FormContext" LinkType="Record"></mj-form-field>
            </div>

            <!-- Full-width: Description -->
            <div class="field-grid field-grid--single">
                <mj-form-field [Record]="Record" [ShowLabel]="true" FieldName="Description"
                    Type="textarea" [EditMode]="EditMode" [FormContext]="FormContext"></mj-form-field>
            </div>
        </div>
    }
</div>
