<div class="org-header">
    <div class="org-header__logo">{{ LogoInitial }}</div>
    <div class="org-header__identity">
        <div class="org-header__name">{{ Record?.Name }}</div>
        <div class="org-header__sub">
            @if (Record?.OrganizationType) {
                <span>{{ Record?.OrganizationType }}</span>
            }
            <span class="org-header__badge">
                <span class="org-header__badge-dot"></span>
                {{ Record?.Status || 'Active' }}
            </span>
            @if (Record?.FoundedDate) {
                <span>Founded {{ FoundedYear }}</span>
            }
        </div>
    </div>
    <div class="org-header__actions">
        @if (Record?.Website) {
            <button class="org-header__btn" (click)="OnWebsiteClick()">
                <i class="fa-solid fa-globe"></i> Website
            </button>
        }
    </div>
</div>
