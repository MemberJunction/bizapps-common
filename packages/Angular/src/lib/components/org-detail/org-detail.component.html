<!-- Organization HQ View -->
@if (Record) {
    <div class="hq-layout">
        <!-- Icon sidebar nav -->
        <nav class="hq-nav">
            @for (item of NavItems; track item.Key) {
                <div class="hq-nav__item"
                     [class.hq-nav__item--active]="ActiveNavSection === item.Key"
                     [title]="item.Title"
                     (click)="OnNavClick(item.Key)">
                    <i [class]="item.Icon"></i>
                </div>
            }
        </nav>

        <!-- Main content area (single scroll context) -->
        <div class="hq-main">
            <!-- Top bar header -->
            <bizapps-org-header
                [Record]="Record"
                (Navigate)="OnChildNavigate($event)"
                (WebsiteClick)="OnWebsiteClick($event)">
            </bizapps-org-header>

            <!-- Sections flow vertically so sidebar scroll works -->
            <div class="hq-content">
                <!-- Organization Details (full width) -->
                <div id="section-overview">
                    <bizapps-org-identity-section
                        [Record]="Record"
                        [EditMode]="EditMode"
                        [FormContext]="FormContext">
                    </bizapps-org-identity-section>
                </div>

                @if (Record.IsSaved) {
                    <!-- Hierarchy Tree (full width) -->
                    <div id="section-hierarchy">
                        <div class="hq-section__title">
                            <i class="fa-solid fa-sitemap"></i> Organization Hierarchy
                        </div>
                        <bizapps-org-hierarchy-tree
                            [OrganizationID]="Record.ID"
                            (Navigate)="OnChildNavigate($event)">
                        </bizapps-org-hierarchy-tree>
                    </div>

                    <!-- Addresses + Contacts side-by-side -->
                    <div class="hq-row">
                        <div id="section-addresses">
                            <bizapps-address-editor
                                EntityName="MJ.BizApps.Common: Organizations"
                                [RecordID]="Record.ID">
                            </bizapps-address-editor>
                        </div>
                        <div id="section-contacts">
                            <bizapps-contact-method-list
                                [OrganizationID]="Record.ID">
                            </bizapps-contact-method-list>
                        </div>
                    </div>

                    <!-- Relationships (full width) -->
                    <div id="section-relationships">
                        <bizapps-relationship-list
                            [OrganizationID]="Record.ID"
                            (Navigate)="OnChildNavigate($event)">
                        </bizapps-relationship-list>
                    </div>
                }
            </div>
        </div>
    </div>
} @else {
    <div class="hq-loading">
        <i class="fa-solid fa-spinner fa-spin"></i> Loading organization record...
    </div>
}
